<main class="dashboard-shell">
  <div class="dashboard-noise" aria-hidden="true"></div>

  <section class="dashboard-frame">
    <header class="dashboard-header">
      <div class="header-copy">
        <h1>{{ title }}</h1>
        <p>Track pricing, stock health, and customer sentiment in one workspace.</p>
      </div>

      <label class="search-field" for="product-search">
        <span class="search-label">Search products</span>
        <input
          id="product-search"
          type="text"
          [value]="searchQuery()"
          (input)="updateSearch(($any($event.target)).value)"
          placeholder="Search by product name or description"
        />
      </label>
    </header>

    <section class="products-grid" *ngIf="filteredProducts().length > 0; else emptyState">
      <app-product-card
        *ngFor="let product of filteredProducts(); trackBy: trackByProductId"
        [product]="product"
        (ratingChange)="updateProductRating($event)"
      />
    </section>

    <ng-template #emptyState>
      <div class="empty-state">
        <h2>No products found</h2>
        <p>Try a different search term to find matching results.</p>
      </div>
    </ng-template>
  </section>
</main>
